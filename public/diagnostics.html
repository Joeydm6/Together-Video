<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tvstack Diagnostics</title>
    <style>
        :root {
            --bg: #1F1F1F;
            --surface: rgba(44, 44, 44, 0.8);
            --surface-strong: rgba(228, 228, 228, 0.08);
            --border: rgba(255, 193, 204, 0.24);
            --text: #E4E4E4;
            --muted: rgba(228, 228, 228, 0.7);
            --accent: #FFC1CC;
            --accent-strong: #F4A6B8;
            --app-menu-max-width: 1200px;
            --app-menu-gap: 1.5rem;
            --motion-fast: 160ms;
            --motion-medium: 240ms;
            --motion-slow: 420ms;
            --ease-standard: cubic-bezier(0.22, 1, 0.36, 1);
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 193, 204, 0.08), transparent 22%),
                radial-gradient(circle at top right, rgba(244, 166, 184, 0.08), transparent 18%),
                linear-gradient(180deg, #191919 0%, var(--bg) 100%);
            color: var(--text);
            padding-top: calc(max(1rem, env(safe-area-inset-top)) + 4.9rem + var(--app-menu-gap));
            overflow-x: hidden;
            position: relative;
        }
        body::before,
        body::after {
            content: "";
            position: fixed;
            pointer-events: none;
            z-index: 0;
            filter: blur(24px);
            opacity: 0.42;
        }
        body::before {
            width: 32rem;
            height: 32rem;
            top: 4rem;
            left: -12rem;
            background: radial-gradient(circle, rgba(255, 193, 204, 0.12), transparent 70%);
        }
        body::after {
            width: 26rem;
            height: 26rem;
            top: 12rem;
            right: -10rem;
            background: radial-gradient(circle, rgba(244, 166, 184, 0.1), transparent 72%);
        }
        .app-menu {
            position: fixed;
            top: max(1rem, env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            width: min(calc(100% - 2rem), var(--app-menu-max-width));
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 1rem;
            background: rgba(31, 31, 31, 0.9);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            transition: opacity var(--motion-medium) ease, transform var(--motion-medium) var(--ease-standard), border-color var(--motion-fast) ease;
        }
        .app-menu-brand {
            min-width: 0;
            text-decoration: none;
            color: var(--text);
        }
        .app-menu-brand strong {
            display: block;
            font-size: clamp(1.25rem, 3vw, 1.8rem);
            line-height: 1.1;
        }
        .app-menu-search {
            margin-left: auto;
            display: block;
            flex: 1 1 24rem;
            max-width: 34rem;
        }
        .app-menu-search-shell {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(228, 228, 228, 0.06);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 0.35rem 0.45rem 0.35rem 0.85rem;
            transition: border-color 0.22s ease, box-shadow 0.22s ease;
        }
        .app-menu-search-shell:focus-within {
            border-color: rgba(255, 193, 204, 0.72);
            box-shadow: 0 0 0 3px rgba(255, 193, 204, 0.14);
        }
        .app-menu-search input {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text);
            padding: 0.75rem 0;
            outline: none;
        }
        .app-menu-button {
            border: 1px solid var(--border);
            background: rgba(228, 228, 228, 0.06);
            color: var(--text);
            border-radius: 999px;
            min-height: 38px;
            padding: 0.58rem 0.9rem;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
            transition: color var(--motion-fast) ease, border-color var(--motion-fast) ease, background-color var(--motion-fast) ease, transform var(--motion-fast) ease, box-shadow var(--motion-medium) ease;
        }
        .app-menu-button:hover {
            border-color: var(--accent);
            transform: translateY(-1px);
        }
        .page {
            width: min(1200px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
            position: relative;
            z-index: 1;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(14px);
            transition: opacity var(--motion-slow) var(--ease-standard), transform var(--motion-slow) var(--ease-standard);
        }
        body.page-ready .topbar {
            opacity: 1;
            transform: none;
        }
        .topbar h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 3rem);
        }
        .topbar p {
            margin: 0.35rem 0 0;
            color: var(--muted);
        }
        .topbar-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .diag-input {
            border: 1px solid var(--border);
            background: rgba(228, 228, 228, 0.06);
            color: var(--text);
            border-radius: 999px;
            padding: 0.75rem 1rem;
            min-width: min(280px, 100%);
        }
        .diag-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--muted);
            font-size: 0.95rem;
        }
        .button {
            border: 1px solid var(--border);
            background: rgba(228, 228, 228, 0.06);
            color: var(--text);
            border-radius: 999px;
            padding: 0.75rem 1rem;
            text-decoration: none;
            cursor: pointer;
            transition: color var(--motion-fast) ease, border-color var(--motion-fast) ease, background-color var(--motion-fast) ease, transform var(--motion-fast) ease, box-shadow var(--motion-medium) ease;
        }
        .button:hover {
            transform: translateY(-1px);
            border-color: rgba(255, 193, 204, 0.52);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        .summary-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity var(--motion-slow) var(--ease-standard), transform var(--motion-slow) var(--ease-standard);
        }
        body.page-ready .summary-bar {
            opacity: 1;
            transform: none;
        }
        body.page-ready #telemetry-summary {
            transition-delay: 60ms;
        }
        .diag-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 0.75rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(228, 228, 228, 0.06);
            color: var(--text);
            font-size: 0.92rem;
            transition: transform var(--motion-fast) ease, border-color var(--motion-fast) ease, background-color var(--motion-fast) ease, box-shadow var(--motion-medium) ease;
        }
        .diag-pill.muted {
            color: var(--muted);
        }
        .diag-pill.is-updated {
            animation: diag-pill-pulse 540ms var(--ease-standard);
        }
        #generated-at.is-refreshing {
            animation: diag-loading 900ms ease-in-out infinite alternate;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
            gap: 1rem;
        }
        .panel {
            border: 1px solid var(--border);
            background: var(--surface);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 1rem;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.14);
            opacity: 0;
            transform: translateY(14px);
            transition: opacity var(--motion-slow) var(--ease-standard), transform var(--motion-slow) var(--ease-standard), border-color var(--motion-fast) ease, box-shadow var(--motion-medium) ease;
        }
        body.page-ready .panel {
            opacity: 1;
            transform: none;
        }
        body.page-ready .grid .panel:nth-child(2) {
            transition-delay: 70ms;
        }
        .panel h2 {
            margin-top: 0;
            margin-bottom: 1rem;
        }
        .diag-card {
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1rem;
            background: rgba(228, 228, 228, 0.05);
            transition: transform var(--motion-fast) ease, border-color var(--motion-fast) ease, box-shadow var(--motion-medium) ease, background-color var(--motion-medium) ease;
        }
        .diag-card.is-active {
            border-color: rgba(255, 193, 204, 0.58);
            box-shadow: 0 0 0 1px rgba(255, 193, 204, 0.24) inset;
        }
        .diag-card.is-updated {
            animation: diag-card-flash 700ms var(--ease-standard);
        }
        .diag-card + .diag-card {
            margin-top: 0.85rem;
        }
        .diag-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 193, 204, 0.42);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.16);
        }
        .diag-card-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
            margin-bottom: 0.85rem;
        }
        .diag-card h3 {
            margin: 0;
        }
        .diag-card p {
            margin: 0.25rem 0 0;
            color: var(--muted);
            word-break: break-word;
        }
        .diag-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
            margin: 0;
        }
        .diag-grid dt {
            color: var(--muted);
            font-size: 0.82rem;
            margin-bottom: 0.15rem;
        }
        .diag-grid dd {
            margin: 0;
            font-weight: 600;
        }
        .diag-subsection {
            margin-top: 0.85rem;
        }
        .diag-list,
        .telemetry-list {
            list-style: none;
            padding: 0;
            margin: 0.65rem 0 0;
        }
        .diag-list li,
        .telemetry-item {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
            align-items: center;
            padding: 0.55rem 0;
            border-top: 1px solid rgba(148, 163, 184, 0.12);
        }
        .telemetry-item {
            align-items: flex-start;
            flex-direction: column;
            gap: 0.2rem;
            transition: background-color var(--motion-medium) ease, border-color var(--motion-fast) ease;
        }
        .telemetry-item.is-new {
            animation: telemetry-in 520ms var(--ease-standard);
        }
        .telemetry-item p {
            margin: 0;
            color: var(--muted);
        }
        .empty-state {
            color: var(--muted);
            margin: 0;
            padding: 0.5rem 0;
        }
        @keyframes diag-card-flash {
            0% {
                border-color: rgba(255, 193, 204, 0.24);
                box-shadow: 0 0 0 0 rgba(255, 193, 204, 0);
            }
            35% {
                border-color: rgba(255, 193, 204, 0.6);
                box-shadow: 0 0 0 1px rgba(255, 193, 204, 0.2), 0 18px 36px rgba(244, 166, 184, 0.12);
            }
            100% {
                border-color: rgba(255, 193, 204, 0.24);
                box-shadow: 0 0 0 0 rgba(255, 193, 204, 0);
            }
        }
        @keyframes telemetry-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }
        @keyframes diag-pill-pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 193, 204, 0);
            }
            40% {
                transform: scale(1.02);
                box-shadow: 0 0 0 6px rgba(255, 193, 204, 0.08);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 193, 204, 0);
            }
        }
        @keyframes diag-loading {
            from {
                opacity: 0.58;
            }
            to {
                opacity: 1;
            }
        }
        @media (max-width: 640px) {
            .app-menu {
                width: min(100%, calc(100% - 1rem));
                top: max(0.5rem, env(safe-area-inset-top));
                flex-wrap: wrap;
                padding: 0.7rem 0.8rem;
            }
            .app-menu-search {
                order: 3;
                margin-left: 0;
                max-width: none;
                flex-basis: 100%;
            }
            .page {
                width: min(100%, calc(100% - 1rem));
                padding-top: 1rem;
            }
            .diag-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <header class="app-menu">
        <a class="app-menu-brand" href="/">
            <strong>Tvstack</strong>
        </a>
        <form class="app-menu-search" action="/" method="GET">
            <div class="app-menu-search-shell">
                <input type="search" name="q" placeholder="Search series, episodes, movies...">
                <button class="app-menu-button" type="submit">Search</button>
            </div>
        </form>
        <a id="menu-tools-link" class="app-menu-button" href="/tools.html">Tools</a>
    </header>
    <div class="page">
        <div class="topbar">
            <div>
                <h1>Room Diagnostics</h1>
                <p>Live rooms, sync snapshots and playback telemetry.</p>
            </div>
            <div class="topbar-actions">
                <input id="diagnostics-filter" class="diag-input" type="search" placeholder="Filter by room code, video or event">
                <label class="diag-toggle"><input id="diagnostics-autorefresh" type="checkbox" checked> Auto refresh</label>
                <span id="generated-at" class="diag-pill muted">Loading diagnostics...</span>
                <button id="copy-diagnostics-json" class="button" type="button">Copy JSON</button>
                <button id="refresh-diagnostics" class="button" type="button">Refresh</button>
                <a class="button" href="/">Back to Library</a>
            </div>
        </div>

        <div id="room-summary" class="summary-bar"></div>
        <div id="telemetry-summary" class="summary-bar"></div>

        <div class="grid">
            <section class="panel">
                <h2>Shared Rooms</h2>
                <div id="shared-rooms"></div>
            </section>
            <section class="panel">
                <h2>Direct Rooms</h2>
                <div id="direct-rooms"></div>
            </section>
        </div>

        <section class="panel" style="margin-top: 1rem;">
            <h2>Recent Telemetry</h2>
            <ul id="recent-telemetry" class="telemetry-list"></ul>
        </section>
    </div>

    <script src="/js/cache-reset.js"></script>
    <script type="module" src="/js/diagnostics.js"></script>
</body>
</html>
